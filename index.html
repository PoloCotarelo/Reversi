<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Otelo Reversi - iPad Ready</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            touch-action: manipulation; /* Optimiza el toque en iPad */
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 2px;
            background-color: #145a32;
            padding: 5px;
            border-radius: 8px;
            width: 90vw; /* Ajuste responsivo para iPad */
            max-width: 400px;
            height: 90vw;
            max-height: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .cell {
            background-color: #27ae60;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Elimina el cuadro azul al tocar */
        }

        .piece {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .black { background-color: #000; box-shadow: 2px 2px 4px rgba(0,0,0,0.4); }
        .white { background-color: #fff; box-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

        .status-box { margin: 15px 0; font-size: 1.2rem; font-weight: bold; }
        .score-box { margin-bottom: 15px; }
        
        button {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 8px;
            -webkit-appearance: none; /* Estilo nativo de iOS fuera */
        }
    </style>
</head>
<body>

    <div class="status-box" id="status">Turno: Negras</div>
    
    <div id="board"></div>

    <div class="score-box">
        Negras: <b id="black-score">2</b> | Blancas: <b id="white-score">2</b>
    </div>

    <button id="resetBtn">Reiniciar Juego</button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const boardElement = document.getElementById('board');
            const statusElement = document.getElementById('status');
            const bScore = document.getElementById('black-score');
            const wScore = document.getElementById('white-score');
            const resetBtn = document.getElementById('resetBtn');

            let board = [];
            let currentPlayer = 1;

            function init() {
                board = Array(8).fill(null).map(() => Array(8).fill(0));
                board = 2; board = 1;
                board = 1; board = 2;
                currentPlayer = 1;
                draw();
            }

            function draw() {
                boardElement.innerHTML = '';
                let counts = { 1: 0, 2: 0 };

                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        
                        // Añadimos tanto click como touchend por si acaso
                        cell.addEventListener('click', (e) => {
                            e.preventDefault();
                            makeMove(r, c);
                        });

                        if (board[r][c] !== 0) {
                            const p = document.createElement('div');
                            p.className = `piece ${board[r][c] === 1 ? 'black' : 'white'}`;
                            cell.appendChild(p);
                            counts[board[r][c]]++;
                        }
                        boardElement.appendChild(cell);
                    }
                }
                bScore.textContent = counts;
                wScore.textContent = counts;
                statusElement.textContent = `Turno: ${currentPlayer === 1 ? 'Negras' : 'Blancas'}`;
            }

            function getFlips(r, c, player) {
                const dirs = [,[0,-1],,[-1,0],,[1,-1],[-1,1],[-1,-1]];
                let total = [];
                dirs.forEach(([dr, dc]) => {
                    let path = [], curR = r + dr, curC = c + dc;
                    while (curR >= 0 && curR < 8 && curC >= 0 && curC < 8) {
                        if (board[curR][curC] === 0) break;
                        if (board[curR][curC] === player) {
                            total = total.concat(path);
                            break;
                        }
                        path.push([curR, curC]);
                        curR += dr; curC += dc;
                    }
                });
                return total;
            }

            function makeMove(r, c) {
                if (board[r][c] !== 0) return;
                const flips = getFlips(r, c, currentPlayer);
                if (flips.length === 0) return;

                board[r][c] = currentPlayer;
                flips.forEach(([fr, fc]) => board[fr][fc] = currentPlayer);
                currentPlayer = 3 - currentPlayer;

                if (!canAnyMove(currentPlayer)) {
                    currentPlayer = 3 - currentPlayer;
                    if (!canAnyMove(currentPlayer)) alert("Partida Finalizada");
                }
                draw();
            }

            function canAnyMove(p) {
                for(let r=0; r<8; r++)
                    for(let c=0; c<8; c++)
                        if(board[r][c] === 0 && getFlips(r,c,p).length > 0) return true;
                return false;
            }

            resetBtn.onclick = init;
            init();
        });
    </script>
</body>
</html>
