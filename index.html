<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Otelo Final</title>
    <style>
        body { background: #2c3e50; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        /* Forzamos que el tablero se vea sí o sí */
        table { 
            margin: 20px auto; 
            border-collapse: collapse; 
            background: #145a32; 
            border: 4px solid #0b331d;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        td { 
            width: 40px; 
            height: 40px; 
            border: 1px solid #1e8449; 
            background: #27ae60; 
            padding: 0;
            cursor: pointer;
            text-align: center;
            vertical-align: middle;
        }

        /* La ficha: si el CSS de círculo falla, esto es un bloque sólido */
        .piece {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: inline-block;
            margin: auto;
        }

        .black { background-color: #000; border: 1px solid #333; }
        .white { background-color: #fff; border: 1px solid #ccc; }
        
        .info { font-size: 1.2em; margin: 10px; }
        button { padding: 10px 20px; font-size: 1em; background: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Juego Otelo</h2>
    <div id="msg" class="info">Turno: Negras</div>
    
    <table id="mainBoard"></table>

    <div class="info">
        Negras: <span id="s1">2</span> | Blancas: <span id="s2">2</span>
    </div>

    <button onclick="reset()">Reiniciar</button>

    <script>
        let board = [];
        let turn = 1; // 1: Negro, 2: Blanco

        function reset() {
            board = Array(8).fill(0).map(() => Array(8).fill(0));
            board = 2; board = 1;
            board = 1; board = 2;
            turn = 1;
            draw();
        }

        function draw() {
            const table = document.getElementById('mainBoard');
            table.innerHTML = "";
            let n1 = 0, n2 = 0;

            for (let r = 0; r < 8; r++) {
                let row = table.insertRow();
                for (let c = 0; c < 8; c++) {
                    let cell = row.insertCell();
                    cell.onclick = () => clickCell(r, c);
                    
                    if (board[r][c] !== 0) {
                        let p = document.createElement('div');
                        p.className = "piece " + (board[r][c] === 1 ? "black" : "white");
                        cell.appendChild(p);
                        board[r][c] === 1 ? n1++ : n2++;
                    }
                }
            }
            document.getElementById('s1').innerText = n1;
            document.getElementById('s2').innerText = n2;
            document.getElementById('msg').innerText = "Turno: " + (turn === 1 ? "Negras" : "Blancas");
        }

        function getFlips(r, c, p) {
            let directions = [,[0,-1],,[-1,0],,[1,-1],[-1,1],[-1,-1]];
            let toFlip = [];
            directions.forEach(d => {
                let temp = [], currR = r + d, currC = c + d;
                while (currR >= 0 && currR < 8 && currC >= 0 && currC < 8) {
                    if (board[currR][currC] === 0) break;
                    if (board[currR][currC] === p) {
                        toFlip = toFlip.concat(temp);
                        break;
                    }
                    temp.push([currR, currC]);
                    currR += d; currC += d;
                }
            });
            return toFlip;
        }

        function clickCell(r, c) {
            if (board[r][c] !== 0) return;
            let flips = getFlips(r, c, turn);
            if (flips.length === 0) return;

            board[r][c] = turn;
            flips.forEach(pos => board[pos][pos] = turn);
            turn = 3 - turn;
            
            // Verificación simple de bloqueo
            if (!canMove(turn)) {
                turn = 3 - turn;
                if (!canMove(turn)) alert("Fin del juego");
            }
            draw();
        }

        function canMove(p) {
            for(let i=0; i<8; i++)
                for(let j=0; j<8; j++)
                    if(board[i][j] === 0 && getFlips(i,j,p).length > 0) return true;
            return false;
        }

        reset();
    </script>
</body>
</html>
