<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Otelo Reversi - Versión Estable</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 2px; /* Espacio entre casillas */
            background-color: #145a32; /* Color de las líneas */
            padding: 5px;
            border-radius: 4px;
        }

        .cell {
            width: 50px;
            height: 50px;
            background-color: #27ae60;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .piece {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .black { background-color: #000; box-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .white { background-color: #fff; box-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .info { margin: 20px; text-align: center; }
        button { padding: 8px 16px; cursor: pointer; background: #e67e22; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <h2>Otelo / Reversi</h2>
    <div id="status">Turno: Negras</div>
    
    <div id="board"></div>

    <div class="info">
        Negras: <span id="black-score">2</span> | Blancas: <span id="white-score">2</span>
        <br><br>
        <button id="resetBtn">Reiniciar Partida</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const boardElement = document.getElementById('board');
            const statusElement = document.getElementById('status');
            const blackScoreElement = document.getElementById('black-score');
            const whiteScoreElement = document.getElementById('white-score');
            const resetBtn = document.getElementById('resetBtn');

            let board = [];
            let currentPlayer = 1; // 1: Negro, 2: Blanco

            function initGame() {
                // Crear matriz 8x8 vacía
                board = Array(8).fill(null).map(() => Array(8).fill(0));
                // Posiciones iniciales clásicas
                board = 2; board = 1;
                board = 1; board = 2;
                currentPlayer = 1;
                render();
            }

            function render() {
                boardElement.innerHTML = '';
                let bCount = 0, wCount = 0;

                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        
                        if (board[r][c] !== 0) {
                            const piece = document.createElement('div');
                            piece.className = `piece ${board[r][c] === 1 ? 'black' : 'white'}`;
                            cell.appendChild(piece);
                            board[r][c] === 1 ? bCount++ : wCount++;
                        }

                        cell.onclick = () => makeMove(r, c);
                        boardElement.appendChild(cell);
                    }
                }
                blackScoreElement.textContent = bCount;
                whiteScoreElement.textContent = wCount;
                statusElement.textContent = `Turno: ${currentPlayer === 1 ? 'Negras' : 'Blancas'}`;
            }

            function makeMove(r, c) {
                if (board[r][c] !== 0) return;

                const piecesToFlip = getFlips(r, c, currentPlayer);
                if (piecesToFlip.length === 0) return;

                board[r][c] = currentPlayer;
                piecesToFlip.forEach(([fr, fc]) => board[fr][fc] = currentPlayer);

                currentPlayer = 3 - currentPlayer;

                // Comprobar si el siguiente puede mover
                if (!canMove(currentPlayer)) {
                    currentPlayer = 3 - currentPlayer;
                    if (!canMove(currentPlayer)) {
                        alert("Fin del juego. ¡Gran partida!");
                    }
                }
                render();
            }

            function getFlips(r, c, player) {
                const directions = [,[0,-1],,[-1,0],,[1,-1],[-1,1],[-1,-1]];
                let flips = [];
                directions.forEach(([dr, dc]) => {
                    let temp = [];
                    let currR = r + dr, currC = c + dc;
                    while (currR >= 0 && currR < 8 && currC >= 0 && currC < 8) {
                        if (board[currR][currC] === 0) break;
                        if (board[currR][currC] === player) {
                            flips = flips.concat(temp);
                            break;
                        }
                        temp.push([currR, currC]);
                        currR += dr; currC += dc;
                    }
                });
                return flips;
            }

            function canMove(player) {
                for(let r=0; r<8; r++) {
                    for(let c=0; c<8; c++) {
                        if (board[r][c] === 0 && getFlips(r,c,player).length > 0) return true;
                    }
                }
                return false;
            }

            resetBtn.onclick = initGame;
            initGame();
        });
    </script>
</body>
</html>
